<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="green-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#008f11" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- hood silhouette -->
  <path d="M100 30 C55 30 30 70 30 110 C30 155 60 180 100 180 C140 180 170 155 170 110 C170 70 145 30 100 30Z" fill="#0d0d0d" stroke="#00ff41" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- face area -->
  <ellipse cx="100" cy="105" rx="40" ry="45" fill="#1a1a1a"/>
  <!-- eyes -->
  <rect x="78" y="95" width="14" height="8" rx="2" fill="#000" stroke="#00ff41" stroke-width="1"/>
  <rect x="108" y="95" width="14" height="8" rx="2" fill="#000" stroke="#00ff41" stroke-width="1"/>
  <rect x="81" y="97" width="3" height="4" fill="#00ff41" opacity="0.8"/>
  <rect x="111" y="97" width="3" height="4" fill="#00ff41" opacity="0.8"/>
  <!-- mouth mask line -->
  <line x1="85" y1="120" x2="115" y2="120" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>
  <line x1="88" y1="123" x2="112" y2="123" stroke="#00ff41" stroke-width="0.3" opacity="0.3"/>
  <!-- matrix rain hint -->
  <text x="45" y="70" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.15">01001</text>
  <text x="120" y="65" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.1">11010</text>
  <text x="50" y="170" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.1">10110</text>
  <text x="125" y="175" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.12">01101</text>
</svg>
